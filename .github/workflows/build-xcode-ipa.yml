name: Build XCode IPA

on:
  workflow_dispatch:
  push:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 90

    steps:
      - name: Check out XCode overlay
        uses: actions/checkout@v4

      - name: Restore pinned Code App source
        run: |
          git clone https://github.com/thebaselab/codeapp.git _xcode_source
          git -C _xcode_source checkout 6493ba80ce29b7e9204fd17b1cc1357edc79cf05
          rsync -a overlay/ _xcode_source/

      - name: Select compatible Xcode 26
        run: |
          sudo xcode-select -s /Applications/Xcode_26.4.1.app/Contents/Developer
          xcodebuild -version

      - name: Download runtime frameworks
        working-directory: _xcode_source
        run: |
          chmod +x downloadFrameworks.sh scripts/build-ipa.sh
          ./downloadFrameworks.sh

      - name: Build unsigned XCode IPA
        working-directory: _xcode_source
        run: ./scripts/build-ipa.sh

      - name: Verify IPA payload
        run: |
          unzip -t _xcode_source/build/output/XCode.ipa
          unzip -l _xcode_source/build/output/XCode.ipa | grep 'Payload/XCode.app/'

      - name: Split XCode IPA for download
        run: |
          mkdir -p _xcode_source/build/output/parts
          split -b 140m -d -a 2 \
            _xcode_source/build/output/XCode.ipa \
            _xcode_source/build/output/parts/XCode.ipa.part-

      - name: Upload XCode IPA part 00
        uses: actions/upload-artifact@v4
        with:
          name: XCode-IPA-Part-00
          path: _xcode_source/build/output/parts/XCode.ipa.part-00
          if-no-files-found: error

      - name: Upload XCode IPA part 01
        uses: actions/upload-artifact@v4
        with:
          name: XCode-IPA-Part-01
          path: _xcode_source/build/output/parts/XCode.ipa.part-01
          if-no-files-found: error

      - name: Upload XCode IPA part 02
        uses: actions/upload-artifact@v4
        with:
          name: XCode-IPA-Part-02
          path: _xcode_source/build/output/parts/XCode.ipa.part-02
          if-no-files-found: error

      - name: Publish XCode IPA release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="xcode-${GITHUB_RUN_NUMBER}"
          gh release create "$TAG" \
            "_xcode_source/build/output/XCode.ipa#XCode.ipa" \
            --repo "$GITHUB_REPOSITORY" \
            --title "XCode iPad build ${GITHUB_RUN_NUMBER}" \
            --notes "Unsigned XCode IPA built from the pinned Code App source. Sign it with your own Apple certificate before installing."
