name: Build XCode IPA

on:
  workflow_dispatch:
  push:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 90

    steps:
      - name: Check out XCode overlay
        uses: actions/checkout@v4

      - name: Restore pinned Code App source
        run: |
          git clone https://github.com/thebaselab/codeapp.git _xcode_source
          git -C _xcode_source checkout 6493ba80ce29b7e9204fd17b1cc1357edc79cf05
          rsync -a overlay/ _xcode_source/

      - name: Select compatible Xcode 26
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app/Contents/Developer
          xcodebuild -version

      - name: Download runtime frameworks
        working-directory: _xcode_source
        run: |
          chmod +x downloadFrameworks.sh scripts/build-ipa.sh
          ./downloadFrameworks.sh

      - name: Build unsigned XCode IPA
        working-directory: _xcode_source
        run: ./scripts/build-ipa.sh

      - name: Verify IPA payload
        run: |
          unzip -t _xcode_source/build/output/XCode.ipa
          unzip -l _xcode_source/build/output/XCode.ipa | grep 'Payload/XCode.app/'

      - name: Upload XCode IPA
        uses: actions/upload-artifact@v4
        with:
          name: XCode-IPA
          path: _xcode_source/build/output/XCode.ipa
          if-no-files-found: error
